aid: trackman
name: TrackMan
description: >-
  TrackMan A/S is a Danish sports-technology company (headquartered in Vedbaek,
  Denmark) that builds Doppler radar and optically tracked launch monitors,
  simulator software, and data platforms for golf, baseball, football, and US
  football. Its hardware lineage includes the TrackMan 4 outdoor/indoor launch
  monitor, TrackMan iO indoor launch monitor, the V3 stadium ball-tracking
  system used by every Major League Baseball club, and the portable B1
  baseball launch monitor. On the software side TrackMan operates TrackMan
  Range (a connected driving-range platform), Virtual Golf 3 (the simulator
  rendering and gameplay engine), the TrackMan Golf App for performance and
  social play, TrackMan 360 for golf-club business operations, and a cloud
  data platform that aggregates measurements across products. TrackMan exposes
  several developer-facing surfaces — a TrackMan Cloud GraphQL API at
  api.golf.trackman.com/graphql for tournaments and facility data, the
  TrackMan Range REST API at docs.trackmanrange.com for range/bay/session
  integration, a device-local TM4 WebSocket protocol for receiving live shot
  measurements over LAN/UPnP from a TrackMan 4 unit, and the TrackMan
  Baseball Data API (Swagger-documented, OAuth-client + username/password)
  for ingesting V3 stadium and B1 portable measurements and media. The
  TrackMan public GitHub organization hosts internal Unity tooling rather
  than client SDKs, and most developer access is partner-gated through
  TrackMan Sports Solutions or the Golf B2B program. The commercial model is
  hardware sales plus tiered software subscriptions (TrackMan Range,
  TrackMan 360, V3 Cloud) sold direct to teams, leagues, ranges, and
  consumers.
